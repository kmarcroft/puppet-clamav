---
# Defaults for all Debian-family systems (Debian 11-13, Ubuntu 22.04-24.04).
# ClamAV packages are in the main Debian/Ubuntu repos — no extra repo needed.

clamav::manage_repo:    false
clamav::clamav_package: 'clamav'
clamav::clamav_version: 'installed'

# ---- User ----
clamav::user:  'clamav'
clamav::uid:   110
clamav::gid:   116
clamav::home:  '/var/lib/clamav'
clamav::shell: '/usr/sbin/nologin'
clamav::group: 'clamav'

# ---- clamd ----
clamav::clamd_package:        'clamav-daemon'
clamav::clamd_version:        'installed'
clamav::clamd_config:         '/etc/clamav/clamd.conf'
clamav::clamd_service:        'clamav-daemon'
clamav::clamd_service_ensure: 'running'
clamav::clamd_service_enable: true

clamav::clamd_options:
  AllowAllMatchScan:        true
  AlgorithmicDetection:     true
  Bytecode:                 true
  BytecodeSecurity:         'TrustSigned'
  BytecodeTimeout:          60000
  CrossFilesystems:         true
  DatabaseDirectory:        '/var/lib/clamav'
  Debug:                    false
  DetectPUA:                false
  ExitOnOOM:                false
  ExtendedDetectionInfo:    true
  FixStaleSocket:           true
  FollowDirectorySymlinks:  false
  FollowFileSymlinks:       false
  ForceToDisk:              false
  Foreground:               false
  IdleTimeout:              30
  LeaveTemporaryFiles:      false
  LocalSocket:              '/var/run/clamav/clamd.ctl'
  LocalSocketGroup:         'clamav'
  LocalSocketMode:          '666'
  LogClean:                 false
  LogFacility:              'LOG_LOCAL6'
  LogFile:                  '/var/log/clamav/clamav.log'
  LogFileMaxSize:           0
  LogRotate:                true
  LogSyslog:                false
  LogTime:                  true
  LogVerbose:               false
  MaxConnectionQueueLength: 15
  MaxDirectoryRecursion:    15
  MaxEmbeddedPE:            '10M'
  MaxHTMLNoTags:            '2M'
  MaxHTMLNormalize:         '10M'
  MaxScriptNormalize:       '5M'
  MaxThreads:               12
  MaxZipTypeRcg:            '1M'
  OfficialDatabaseOnly:     false
  PhishingScanURLs:         true
  PhishingSignatures:       true
  PidFile:                  '/var/run/clamav/clamd.pid'
  ReadTimeout:              180
  ScanArchive:              true
  ScanELF:                  true
  ScanHTML:                 true
  ScanMail:                 true
  ScanOLE2:                 true
  ScanPE:                   true
  ScanSWF:                  true
  SelfCheck:                3600
  TemporaryDirectory:       '/tmp'
  User:                     'clamav'

# ---- freshclam ----
clamav::freshclam_package:        'clamav-freshclam'
clamav::freshclam_version:        'installed'
clamav::freshclam_config:         '/etc/clamav/freshclam.conf'
clamav::freshclam_service:        'clamav-freshclam'
clamav::freshclam_service_ensure: 'running'
clamav::freshclam_service_enable: true

clamav::freshclam_options:
  Bytecode:          true
  Checks:            24
  ConnectTimeout:    30
  DatabaseDirectory: '/var/lib/clamav'
  DatabaseOwner:     'clamav'
  Debug:             false
  DNSDatabaseInfo:   'current.cvd.clamav.net'
  Foreground:        false
  LogFacility:       'LOG_LOCAL6'
  LogFile:           '/var/log/clamav/freshclam.log'
  LogRotate:         true
  LogSyslog:         false
  LogTime:           true
  LogVerbose:        false
  MaxAttempts:       5
  NotifyClamd:       '/var/run/clamav/clamd.ctl'
  PidFile:           '/var/run/clamav/freshclam.pid'
  ReceiveTimeout:    30
  ScriptedUpdates:   true
  TestDatabases:     true
  UpdateLogFile:     '/var/log/clamav/freshclam.log'

# ---- clamav-milter ----
clamav::clamav_milter_package:        'clamav-milter'
clamav::clamav_milter_version:        'installed'
clamav::clamav_milter_config:         '/etc/clamav/clamav-milter.conf'
clamav::clamav_milter_service:        'clamav-milter'
clamav::clamav_milter_service_ensure: 'running'
clamav::clamav_milter_service_enable: true

clamav::clamav_milter_options:
  ClamdSocket:  'unix:/var/run/clamav/clamd.ctl'
  LogSyslog:    false
  LogFile:      '/var/log/clamav/clamav-milter.log'
  MilterSocket: 'inet:8890@localhost'
  User:         'clamav'
