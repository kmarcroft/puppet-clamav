---
# Module-wide defaults and deep-merge configuration.
# OS-specific values live in RedHat.yaml / Debian.yaml and their subdirectories.

lookup_options:
  clamav::clamd_options:
    merge: deep
  clamav::freshclam_options:
    merge: deep
  clamav::clamav_milter_options:
    merge: deep
  clamav::on_access_options:
    merge: deep

# These booleans are false by default; enable what you need in your Hiera.
clamav::manage_user:          false
clamav::manage_repo:          false
clamav::manage_clamd:         false
clamav::manage_freshclam:     false
clamav::manage_clamav_milter: false
clamav::manage_on_access:     false

# Override this list to replace (not append to) the default mirror.
# Uses normal first-wins Hiera merge so your value completely replaces the
# module default rather than being appended to it.
clamav::freshclam_database_mirrors:
  - 'database.clamav.net'

# The database directory must be writable by the freshclam process user.
# Puppet manages the directory ownership so it survives package reinstalls
# and UID changes (e.g. RHEL10 assigns different UIDs than RHEL8/9).
clamav::freshclam_db_dir:   '/var/lib/clamav'
clamav::freshclam_db_owner: 'clamav'
clamav::freshclam_db_group: 'clamav'

# On-access scanning defaults: whole-system, detection-only, with exclusions for
# pseudo-filesystems, remote mounts, container layers, and other paths that
# either cannot carry malware or are prohibitively expensive to scan.
#
# Set clamav::manage_on_access: true in your Hiera to activate.
# Override clamav::on_access_paths if you need a narrower scope.
clamav::on_access_paths:
  - '/'

clamav::on_access_options:
  # ----- Scanning mode --------------------------------------------------- #
  # false = detection/alert only (log + notify), no blocking.               #
  # Set to true only if you accept the risk of legitimate access being       #
  # denied on a false positive and have tested thoroughly.                   #
  OnAccessPrevention:     false

  # ----- Performance safeguards ------------------------------------------ #
  # Skip files larger than 5 MB at open time; clamd scheduled scans cover   #
  # large files in full.                                                     #
  OnAccessMaxFileSize:    '5M'
  # Do not scan files opened by root — root can already read anything.       #
  OnAccessExcludeRootUID: true
  # NOTE: OnAccessDisableDDD is intentionally absent.  Disabling DDD turns  #
  # recursive watching into non-recursive (top-level only), which means      #
  # subdirectories — including /tmp — are never watched.  Container/overlay  #
  # double-scanning is prevented instead by the OnAccessExcludePath entries  #
  # below.                                                                    #

  # ----- Path exclusions -------------------------------------------------- #
  # Kernel virtual / pseudo-filesystems — no real files, scanning is noise.  #
  # Remote filesystems — scanning on the client silently re-downloads every  #
  #   block; let the server-side AV handle these.                            #
  # Container storage — overlay layers are scanned by the registry/CI;       #
  #   in-kernel page-cache sharing means re-scanning is wasteful.            #
  # Snap mounts — squashfs loop-back, signed & read-only, changed by snap.  #
  OnAccessExcludePath:
    - '/proc'
    - '/sys'
    - '/dev'
    - '/run'
    - '/snap'
    - '/var/lib/snapd/snaps'
    - '/var/lib/docker'
    - '/var/lib/containers'
    - '/var/lib/kubelet'
    - '/nfs'
    - '/mnt'
    - '/media'
    - '/net'

