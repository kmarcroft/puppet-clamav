---
version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: "OS name / major release"
    path: "%{facts.os.name}/%{facts.os.release.major}.yaml"
  - name: "OS family / major release"
    path: "%{facts.os.family}/%{facts.os.release.major}.yaml"
  - name: "OS family"
    path: "%{facts.os.family}.yaml"
  - name: "common"
    path: "common.yaml"
